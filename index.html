<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sésame - Ouvrez vos horizons</title>
  
  <!-- Chargement du CDN Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Configuration standard de Tailwind CSS -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sesame: {
              50: '#fdfbf7',
              100: '#fbf7ed',
              200: '#f5ecd5',
              300: '#ebd8ad',
              400: '#dfbe7f',
              500: '#d19e51',
              600: '#be813b',
              700: '#9e622d',
              800: '#804e27',
              900: '#683f21',
              950: '#392010',
            }
          }
        }
      }
    };
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Barre de défilement personnalisée */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #fdfbf7;
    }
    ::-webkit-scrollbar-thumb {
      background: #dfbe7f;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #be813b;
    }

    /* Styles pour la modale et le bouton CodePlay */
    /* Floutage de l'arrière-plan */
    .modal-overlay {
        backdrop-filter: blur(8px);
        transition: all 0.3s ease-in-out;
    }
    
    /* Effet d'apparition de la fenêtre */
    .modal-content {
        transform: scale(0.95);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .modal-active .modal-overlay {
        opacity: 1;
        pointer-events: auto;
    }
    
    .modal-active .modal-content {
        transform: scale(1);
        opacity: 1;
    }

    /* Style du bouton */
    .mon-bouton-style {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        font-weight: 600;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -1px rgba(79, 70, 229, 0.1);
        transition: all 0.2s ease-in-out;
        cursor: pointer;
        border: none;
        text-decoration: none;
    }

    .mon-bouton-style:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3), 0 4px 6px -2px rgba(79, 70, 229, 0.05);
        filter: brightness(1.1);
    }

    .mon-bouton-style:active {
        transform: translateY(0);
    }

    /* Animation de chargement */
    .spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: #4f46e5;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-sesame-50 text-sesame-950 min-h-screen">

  <div id="root"></div>

  <!-- SDKs Firebase -->
  <script type="module" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Configuration Firebase du client
    const firebaseConfig = {
      apiKey: "AIzaSyBs4p7kaG0d6GMuMRiThl1W7_ZTncLCBCo",
      authDomain: "sesameouvretoi-13.firebaseapp.com",
      projectId: "sesameouvretoi-13",
      storageBucket: "sesameouvretoi-13.firebasestorage.app",
      messagingSenderId: "167364948430",
      appId: "1:167364948430:web:e1874c21b6d39fd412bb9f",
      measurementId: "G-VRWJPSC723"
    };

    // Initialisation
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "sesameouvretoi-13";

    window.FirebaseServices = { auth, db, appId, doc, setDoc, getDoc, collection, addDoc, onSnapshot, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged };
  </script>

  <!-- Application React -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Nouveau composant Logo Sésame basé sur sesame.png
    function SesameLogo({ className = "w-10 h-10" }) {
      return (
        <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sesame-border-gradient" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="#ff9f43" />
              <stop offset="30%" stopColor="#ff5252" />
              <stop offset="70%" stopColor="#7f53ac" />
              <stop offset="100%" stopColor="#6471eb" />
            </linearGradient>
          </defs>
          {/* Fond sombre squircle arrondi de couleur marine profonde */}
          <rect x="4" y="4" width="92" height="92" rx="26" fill="#070b19" />
          {/* Contour dégradé lumineux */}
          <rect x="4" y="4" width="92" height="92" rx="26" stroke="url(#sesame-border-gradient)" strokeWidth="4.5" />
          {/* Lettre S majuscule grasse et colorée */}
          <text x="50" y="64" fill="#ffca28" fontSize="48" fontWeight="900" textAnchor="middle" fontFamily="'Plus Jakarta Sans', system-ui, sans-serif">S</text>
        </svg>
      );
    }

    // Définition de l'icône de boutique personnalisée en SVG pour correspondre exactement à l'image
    function StoreIcon() {
      return (
        <svg className="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7" />
          <path d="M4 12V22a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V12" />
          <path d="M2 7h20" />
          <path d="M12 22V12" />
          <path d="M3 7a3 3 0 0 1 3-3 3 3 0 0 1 6 0 3 3 0 0 1 6 0 3 3 0 0 1 3 3" />
        </svg>
      );
    }

    // Définition de l'icône d'entraide / poignée de main personnalisée pour correspondre exactement à l'image
    function HandshakeIcon() {
      return (
        <svg className="w-8 h-8 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M16 11V6a2 2 0 0 0-2-2h0a2 2 0 0 0-2 2v3" />
          <path d="M12 10V8a2 2 0 0 0-2-2h0a2 2 0 0 0-2 2v3" />
          <path d="M10 10.5V9a2 2 0 0 0-2-2h0a2 2 0 0 0-2 2v3" />
          <path d="M6 12v-1.5a1.5 1.5 0 0 0-3 0v4.75a6.75 6.75 0 0 0 6.75 6.75h2.5a6 6 0 0 0 6-6V13" />
          <path d="M16 14.5a1.5 1.5 0 0 1 3 0V16" />
        </svg>
      );
    }

    // Définition de l'icône Globe Terrestre personnalisée pour correspondre exactement à la troisième image
    function GlobeIcon() {
      return (
        <svg className="w-8 h-8 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
          <path d="M2 12h20" />
        </svg>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [authMode, setAuthMode] = useState('login'); // 'login' | 'register'
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [activeTab, setActiveTab] = useState('home'); // 'home' | 'services' | 'dashboard'
      
      // Formulaires d'authentification
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [fullName, setFullName] = useState('');
      const [authError, setAuthError] = useState('');
      const [authSuccess, setAuthSuccess] = useState('');

      // Services Firebase
      const [services, setServices] = useState(null);

      // États Firestore synchronisés
      const [userSubscriptions, setUserSubscriptions] = useState({
        digital: false,
        conseil: false,
        resteDuMonde: false,
        sesameExpress: false
      });
      const [userActivities, setUserActivities] = useState([]);
      const [actionLoading, setActionLoading] = useState(false);
      const [notif, setNotif] = useState(null);
      
      // Modal d'espace de règlement
      const [showPaymentModal, setShowPaymentModal] = useState(false);

      // MODALE DEVIS GRATUIT ET FORMULAIRE
      const [showQuoteModal, setShowQuoteModal] = useState(false);
      const [quotePillars, setQuotePillars] = useState({ digital: false, conseil: false, resteDuMonde: false });
      const [quoteName, setQuoteName] = useState('');
      const [quoteEmail, setQuoteEmail] = useState('');
      const [quotePhone, setQuotePhone] = useState('');
      const [quoteMessage, setQuoteMessage] = useState('');
      
      // ÉTAT DE LA SECTION QUESTIONS FRÉQUENTES (FAQ)
      const [openFaqIndex, setOpenFaqIndex] = useState(null);

      // Liste des questions-réponses pour l'accordéon FAQ
      const faqData = [
        {
          question: "Quels sont les frais annuels de 45 € et à quoi servent-ils ?",
          answer: "Ces frais annuels obligatoires couvrent l'hébergement hautement sécurisé de votre site sur nos serveurs haute performance, la réservation et le renouvellement de votre nom de domaine personnalisé (ex: maboutique.fr), ainsi que la mise en place de sauvegardes automatiques de vos données."
        },
        {
          question: "L'abonnement Conseil & Aide de 7 €/mois est-il obligatoire ?",
          answer: "Non, cet abonnement est totalement optionnel. Il est destiné aux créateurs qui souhaitent bénéficier d'un accompagnement personnalisé régulier, d'analyses régulières de leur trafic et d'une aide stratégique continue pour améliorer leur visibilité sur Google."
        },
        {
          question: "Comment se passe la création de mon site après l'envoi du devis ?",
          answer: "Dès réception de votre demande de devis, un conseiller Sésame vous contacte sous 24h pour affiner vos besoins. Une fois le cahier des charges et le devis validés, notre équipe de spécialistes commence le développement. Vous suivez chaque étape jusqu'à la mise en ligne !"
        }
      ];
      
      // Variable de référence pour éviter le doublon d'accueil lors de la détection de session automatique
      const isNewUserRegistered = useRef(false);

      // Récupération des services après chargement du script de module
      useEffect(() => {
        const interval = setInterval(() => {
          if (window.FirebaseServices) {
            setServices(window.FirebaseServices);
            clearInterval(interval);
          }
        }, 100);
        return () => clearInterval(interval);
      }, []);

      // Écoute de l'état d'authentification Firebase
      useEffect(() => {
        if (!services) return;
        const { auth, onAuthStateChanged } = services;
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            setLoading(false);
            
            // Fermeture automatique de la petite fenêtre (modal) lors d'une connexion ou inscription réussie
            setShowAuthModal(false);
            
            // Pré-remplir l'email dans le devis
            setQuoteEmail(currentUser.email || '');
            
            // Différencier l'accueil entre une inscription toute fraîche et une session restaurée
            if (isNewUserRegistered.current) {
              showNotification("Bienvenue sur Sésame ! Votre compte a été créé.", "success");
              isNewUserRegistered.current = false; // Réinitialisation du flag
            } else {
              showNotification("Heureux de vous revoir sur Sésame !", "success");
              logUserActivity(currentUser.uid, "Connexion automatique", "Session utilisateur restaurée avec succès");
            }
          } else {
            // Nettoyage complet à la déconnexion
            setUser(null);
            setUserSubscriptions({
              digital: false,
              conseil: false,
              resteDuMonde: false,
              sesameExpress: false
            });
            setUserActivities([]);
            setQuoteEmail('');
            setLoading(false);
          }
        });
        return () => unsubscribe();
      }, [services]);

      // Garde de sécurité : Empêcher l'accès au Tableau de bord si déconnecté
      useEffect(() => {
        if (!user && activeTab === 'dashboard') {
          setActiveTab('home');
        }
      }, [user, activeTab]);

      // Écoute en temps réel des abonnements et activités
      useEffect(() => {
        if (!services || !user) {
          setUserSubscriptions({
            digital: false,
            conseil: false,
            resteDuMonde: false,
            sesameExpress: false
          });
          setUserActivities([]);
          return;
        }

        const { db, appId, doc, collection, onSnapshot } = services;

        // Écoute des abonnements
        const subDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'subscriptions', 'current');
        const unsubSub = onSnapshot(subDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setUserSubscriptions({
              digital: !!data.digital,
              conseil: !!data.conseil,
              resteDuMonde: !!data.resteDuMonde,
              sesameExpress: !!data.sesameExpress
            });
          } else {
            setUserSubscriptions({
              digital: false,
              conseil: false,
              resteDuMonde: false,
              sesameExpress: false
            });
          }
        }, (err) => {
          console.error("Erreur de chargement des abonnements :", err);
        });

        // Écoute du flux d'activités
        const actColRef = collection(db, 'artifacts', appId, 'users', user.uid, 'activities');
        const unsubAct = onSnapshot(actColRef, (querySnap) => {
          const acts = [];
          querySnap.forEach((doc) => {
            acts.push({ id: doc.id, ...doc.data() });
          });
          acts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          setUserActivities(acts);
        }, (err) => {
          console.error("Erreur de chargement de l'historique :", err);
        });

        return () => {
          unsubSub();
          unsubAct();
        };
      }, [services, user]);

      // Afficher une notification
      const showNotification = (message, type = "info") => {
        setNotif({ message, type });
        setTimeout(() => setNotif(null), 4000);
      };

      // Enregistrer une activité
      const logUserActivity = async (userId, actionTitle, description = "") => {
        if (!services || !userId) return;
        const { db, appId, collection, addDoc } = services;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', userId, 'activities'), {
            title: actionTitle,
            description: description,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
          });
        } catch (e) {
          console.error("Erreur d'enregistrement d'activité :", e);
        }
      };

      // Envoyer l'état complet des services à Formspree
      const sendUpdateToFormspree = async (updatedSubs, serviceName, actionWord) => {
        try {
          const payload = {
            message: `Mise à jour des services Sésame`,
            client_email: user?.email || "Inconnu",
            client_uid: user?.uid || "Inconnu",
            action_effectuee: `${actionWord} du service : ${serviceName}`,
            date_action: new Date().toLocaleString('fr-FR'),
            services_actifs: {
              digital_web: updatedSubs.digital ? "ACTIF ✓" : "INACTIF",
              conseil_aide: updatedSubs.conseil ? "ACTIF ✓" : "INACTIF",
              reste_du_monde: updatedSubs.resteDuMonde ? "ACTIF ✓" : "INACTIF",
              sesame_express: updatedSubs.sesameExpress ? "ACTIF ✓" : "INACTIF"
            }
          };

          await fetch('https://formspree.io/f/xbdazkbd', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
          });
          
          console.log("Mise à jour envoyée avec succès à Formspree !");
        } catch (err) {
          console.error("Erreur d'envoi vers Formspree :", err);
        }
      };

      // SOUMETTRE LA DEMANDE DE DEVIS GRATUIT
      const handleQuoteSubmit = async (e) => {
        e.preventDefault();
        
        // Extraire les piliers sélectionnés
        const selectedPillars = [];
        if (quotePillars.digital) selectedPillars.push("Digital & Web");
        if (quotePillars.conseil) selectedPillars.push("Conseil & Aide");
        if (quotePillars.resteDuMonde) selectedPillars.push("Le Reste du Monde");

        if (selectedPillars.length === 0) {
          showNotification("Veuillez sélectionner au moins un pilier d'intervention.", "warning");
          return;
        }

        try {
          const payload = {
            message: "Nouvelle demande de Devis Gratuit Sésame",
            client_name: quoteName,
            client_email: quoteEmail,
            client_phone: quotePhone,
            selected_pillars: selectedPillars.join(", "),
            project_details: quoteMessage,
            date_request: new Date().toLocaleString('fr-FR')
          };

          // Envoi au service de formulaire Formspree
          await fetch('https://formspree.io/f/xbdazkbd', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          // Enregistrer dans Firestore pour le suivi d'activité du client connecté
          if (user) {
            await logUserActivity(
              user.uid, 
              "Demande de Devis Gratuit", 
              `Piliers sélectionnés : ${selectedPillars.join(", ")}. Message : ${quoteMessage.substring(0, 60)}...`
            );
          }

          showNotification("Votre demande de devis gratuit a été envoyée avec succès !", "success");
          setShowQuoteModal(false);

          // Réinitialisation du formulaire
          setQuotePillars({ digital: false, conseil: false, resteDuMonde: false });
          setQuoteName('');
          setQuotePhone('');
          setQuoteMessage('');
          if (!user) setQuoteEmail('');
        } catch (err) {
          console.error("Erreur d'envoi du devis :", err);
          showNotification("Une erreur s'est produite lors de l'envoi du formulaire.", "error");
        }
      };

      // Inscription
      const handleRegister = async (e) => {
        e.preventDefault();
        if (!services) return;
        setAuthError('');
        setAuthSuccess('');

        // Activer le flag d'inscription pour l'écouteur onAuthStateChanged
        isNewUserRegistered.current = true;

        const { auth, createUserWithEmailAndPassword, db, appId, doc, setDoc } = services;
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const newUser = userCredential.user;

          // Création du profil initial
          await setDoc(doc(db, 'artifacts', appId, 'users', newUser.uid, 'profile', 'info'), {
            fullName: fullName || "Client Sésame",
            email: email,
            createdAt: new Date().toISOString()
          });

          // Création des abonnements initiaux
          const initialSubs = {
            digital: false,
            conseil: false,
            resteDuMonde: false,
            sesameExpress: false
          };
          
          await setDoc(doc(db, 'artifacts', appId, 'users', newUser.uid, 'subscriptions', 'current'), initialSubs);

          // Enregistrer le premier geste sur Firestore
          await logUserActivity(newUser.uid, "Création du compte Sésame", `Bienvenue chez Sésame, ${fullName || email}`);
          
          // Notification Formspree de la création du compte
          await sendUpdateToFormspree(initialSubs, "Création de compte", "Création");

          setAuthSuccess('Votre compte a été créé avec succès !');
          
          // Fermeture instantanée de la petite fenêtre dès la réussite
          setShowAuthModal(false);
          setActiveTab('dashboard');
          
          // Nettoyer les champs du formulaire
          setEmail('');
          setPassword('');
          setFullName('');
        } catch (error) {
          isNewUserRegistered.current = false; // Réinitialiser en cas d'erreur
          setAuthError(getFriendlyErrorMessage(error.code));
        }
      };

      // Connexion
      const handleLogin = async (e) => {
        e.preventDefault();
        if (!services) return;
        setAuthError('');
        setAuthSuccess('');

        const { auth, signInWithEmailAndPassword } = services;
        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          await logUserActivity(userCredential.user.uid, "Connexion manuelle", "Session initiée avec succès");
          
          // Fermeture instantanée de la petite fenêtre dès la réussite
          setShowAuthModal(false);
          setActiveTab('dashboard');
          
          setEmail('');
          setPassword('');
        } catch (error) {
          setAuthError(getFriendlyErrorMessage(error.code));
        }
      };

      // Déconnexion complète
      const handleLogout = async () => {
        if (!services || !user) return;
        const { auth, signOut } = services;
        
        logUserActivity(user.uid, "Déconnexion de l'utilisateur", "L'utilisateur s'est déconnecté manuellement de sa session.");

        try {
          setActiveTab('home');
          setUser(null);
          setUserSubscriptions({
            digital: false,
            conseil: false,
            resteDuMonde: false,
            sesameExpress: false
          });
          setUserActivities([]);

          await signOut(auth);
          showNotification("Déconnexion sécurisée réussie. À bientôt sur Sésame !", "info");
        } catch (error) {
          console.error("Erreur de déconnexion :", error);
          setUser(null);
          setActiveTab('home');
          showNotification("Déconnexion locale effectuée.", "warning");
        }
      };

      // Activer / Désactiver un service
      const toggleService = async (serviceKey, serviceName, costInfo = "") => {
        if (!user) {
          setShowAuthModal(true);
          showNotification("Veuillez vous connecter pour gérer vos services.", "warning");
          return;
        }

        setActionLoading(true);
        const { db, appId, doc, setDoc } = services;
        
        const currentStatus = !userSubscriptions[serviceKey];

        const updatedSubs = {
          digital: serviceKey === 'digital' ? currentStatus : !!userSubscriptions.digital,
          conseil: serviceKey === 'conseil' ? currentStatus : !!userSubscriptions.conseil,
          resteDuMonde: serviceKey === 'resteDuMonde' ? currentStatus : !!userSubscriptions.resteDuMonde,
          sesameExpress: serviceKey === 'sesameExpress' ? currentStatus : !!userSubscriptions.sesameExpress
        };

        try {
          // 1. Sauvegarde dans Firestore
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'subscriptions', 'current'), updatedSubs);
          
          const actionWord = currentStatus ? "Activation" : "Désactivation";
          const costDesc = currentStatus && costInfo ? ` au prix de ${costInfo}` : "";
          
          // 2. Log de l'activité locale pour affichage dans l'historique
          await logUserActivity(
            user.uid, 
            `${actionWord} : ${serviceName}`, 
            `L'utilisateur a configuré le service "${serviceName}" sur ${currentStatus ? 'ACTIF' : 'INACTIF'}${costDesc}.`
          );

          // 3. ENVOI INSTANTANÉ VERS FORMSPREE
          await sendUpdateToFormspree(updatedSubs, serviceName, actionWord);

          showNotification(
            currentStatus 
              ? `Service "${serviceName}" activé avec succès !` 
              : `Service "${serviceName}" désactivé.`,
            currentStatus ? "success" : "info"
          );
        } catch (error) {
          console.error("Erreur de mise à jour :", error);
          showNotification("Une erreur est survenue lors de la mise à jour.", "error");
        } finally {
          setActionLoading(false);
        }
      };

      // Suivre la consultation des services
      const trackServiceView = (serviceName) => {
        if (user) {
          logUserActivity(user.uid, `Consultation de service`, `L'utilisateur consulte les détails de : ${serviceName}`);

      const handlePaymentClick = (serviceName) => {
        if (user) {
          logUserActivity(user.uid, "Accès Paiement", `L'utilisateur a cliqué sur le bouton de règlement pour : ${serviceName}`);
        }
      };

      // GESTION DU CLIC SUR LA FAQ POUR SUIVRE LES FAITS ET GESTES
      const toggleFaqItem = (index) => {
        const isOpening = openFaqIndex !== index;
        setOpenFaqIndex(isOpening ? index : null);
        if (user) {
          logUserActivity(
            user.uid, 
            isOpening ? "Consultation FAQ" : "Fermeture FAQ", 
            `L'utilisateur a ${isOpening ? 'ouvert' : 'fermé'} la question : "${faqData[index].question}"`

        }

      // Traduction des messages d'erreur Firebase
      const getFriendlyErrorMessage = (code) => {
        switch (code) {
          case 'auth/invalid-email': return 'Adresse e-mail invalide.';
          case 'auth/user-disabled': return 'Ce compte a été désactivé.';
          case 'auth/user-not-found': return 'Aucun utilisateur trouvé avec cette adresse.';
          case 'auth/wrong-password': return 'Mot de passe incorrect.';
          case 'auth/email-already-in-use': return 'Cette adresse e-mail est déjà utilisée.';
          case 'auth/weak-password': return 'Le mot de passe doit contenir au moins 6 caractères.';
          default: return 'Une erreur est survenue. Veuillez réessayer.';
        }
      };

      const navigateTo = (tabName) => {
        setActiveTab(tabName);
        if (user) {

                    <div className="space-y-6">
                      
                      {/* Carré de l'icône rétro-éclairé */}
                      <div className="w-16 h-16 rounded-[22px] border border-slate-700/60 bg-slate-900/40 flex items-center justify-center shadow-lg">
                        <StoreIcon />
                      </div>
                      
                      {/* Textes Principaux */}
                      <div className="space-y-3">

                        <p className="text-sm text-slate-300 leading-relaxed">

                      {/* Lignes de tarification style Image */}
                      <div className="space-y-2.5 pt-2">
                        {/* Ligne 1 */}
                        <div className="flex items-center justify-between p-3.5 rounded-xl border border-slate-800/80 bg-slate-950/50">
                          <span className="text-xs font-medium text-slate-400">Création de site</span>
                          <span className="text-xs font-black text-[#6366F1] tracking-wide bg-[#6366F1]/10 px-2.5 py-1 rounded-md border border-[#6366F1]/20">Sur Devis</span>
                        </div>
                        {/* Ligne 2 */}
                        <div className="flex items-center justify-between p-3.5 rounded-xl border border-slate-800/80 bg-slate-950/50">
                          <span className="text-xs font-medium text-slate-400">Abonnement URL/Serveur</span>
                          <span className="text-xs font-black text-amber-400 tracking-wide bg-amber-400/10 px-2.5 py-1 rounded-md border border-amber-400/20">45€ / an</span>

                      </div>
                    </div>

                    {/* Pied de carte avec contrôle d'activation */}

                      <span className="text-[11px] font-semibold text-slate-500">Service Principal</span>
                      <button

                        className={`px-5 py-2.5 rounded-xl font-bold text-xs transition ${userSubscriptions.digital ? 'bg-indigo-950/80 text-indigo-300 border border-indigo-500/30' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md'}`}>

                    </div>
                  </div>

                  {/* PILIER 2: Conseil & Aide */}

                    {/* Badge POPULAIRE en haut à droite */}
                    <div className="absolute top-6 right-6 bg-amber-500/10 text-amber-400 text-[10px] font-black tracking-wider px-3 py-1 rounded-full border border-amber-500/20 uppercase">

                    </div>

                    <div className="space-y-6">
                      
                      {/* Carré de l'icône de poignée de main rétro-éclairé */}
                      <div className="w-16 h-16 rounded-[22px] border border-slate-700/60 bg-slate-900/40 flex items-center justify-center shadow-lg">
                        <HandshakeIcon />
                      </div>
                      
                      {/* Textes Principaux */}
                      <div className="space-y-3">
                        <h4 className="text-2xl font-bold tracking-tight text-white">SERVICES Conseil & Aide</h4>
                        <p className="text-sm text-slate-300 leading-relaxed">
                          L'accompagnement indispensable après lancement. Nous vous aidons à piloter, promouvoir et optimiser votre site pour le hisser au sommet de Google.

                      </div>
                      
                      {/* Lignes de tarification style Image */}
                      <div className="space-y-2.5 pt-2">

                    <div className="pt-6 mt-6 border-t border-slate-800 flex items-center justify-between">
                      <span className="text-[11px] font-semibold text-slate-500">Formule Conseil</span>
                      <button

                        className={`px-5 py-2.5 rounded-xl font-bold text-xs transition ${userSubscriptions.conseil ? 'bg-emerald-950/80 text-emerald-300 border border-emerald-500/30' : 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md'}`}>

                    </div>
                  </div>

                  {/* PILIER 3: Le Reste du Monde */}
                  <div 
                    onClick={() => trackServiceView("SERVICES Le Reste du Monde")}

                    <div className="space-y-6">
                      
                      {/* Carré de l'icône globe rétro-éclairé */}

                      </div>
                      
                      {/* Textes Principaux d'origine conservés */}
                      <div className="space-y-3">

                      {/* Lignes de tarification style Image */}

                            <div className={`absolute left-0 top-0 bottom-0 flex w-6 justify-center ${idx === userActivities.length - 1 ? 'h-6' : ''}`}>

                            </div>
                            <div className="relative flex h-6 w-6 flex-none items-center justify-center bg-white">
                              <span className={`h-3.5 w-3.5 rounded-full ring-4 ring-white ${
                                activity.title.includes('Activation') ? 'bg-emerald-500' :
                                activity.title.includes('Désactivation') ? 'bg-rose-500' :
                                activity.title.includes('Connexion') ? 'bg-purple-500' : 'bg-amber-500'
                              }`} />
                            </div>
                            <div className="flex-auto py-0.5 text-xs leading-5">
                              <div className="flex justify-between gap-x-4">
                                <p className="font-semibold text-sesame-900">{activity.title}</p>
                                <time className="flex-none text-sesame-400 font-mono">
                                  {new Date(activity.timestamp).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}
                                </time>
                              </div>
                              <p className="text-sesame-600 mt-1">{activity.description}</p>
                            </div>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              </section>
            )}

          </main>

          {/* Pied de page (Footer) */}
          <footer className="bg-sesame-950 text-sesame-200 py-12 px-6 border-t border-sesame-900 mt-12">
            <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-8">
              <div className="space-y-4">
                <div className="flex items-center gap-3">
                  <SesameLogo className="w-8 h-8" />
                  <h4 className="text-white text-xl font-black tracking-wider">SÉSAME</h4>
                </div>
                <p className="text-xs text-sesame-400 leading-relaxed">
                  Votre clé d'accès universelle à un monde de services d'élite. Conçu pour simplifier votre quotidien.
                </p>
              </div>
              <div>
                <h5 className="text-white text-sm font-black mb-4 uppercase tracking-wider">Nos Piliers</h5>
                <ul className="space-y-2 text-xs text-sesame-400">
                  <li><a href="#" onClick={(e) => { e.preventDefault(); navigateTo('services'); }} className="hover:text-white transition">Digital & Web</a></li>
                  <li><a href="#" onClick={(e) => { e.preventDefault(); navigateTo('services'); }} className="hover:text-white transition">Conseil & Aide</a></li>
                  <li><a href="#" onClick={(e) => { e.preventDefault(); navigateTo('services'); }} className="hover:text-white transition">Le Reste du Monde</a></li>
                </ul>
              </div>
              <div>
                <h5 className="text-white text-sm font-black mb-4 uppercase tracking-wider">Options Premium</h5>
                <ul className="space-y-2 text-xs text-sesame-400">
                  <li><span className="text-amber-400 font-bold">Sésame Express⚡ (80.50 €)</span></li>
                  <li><span>Conciergerie Instantanée</span></li>
                </ul>
              </div>
              <div>
                <h5 className="text-white text-sm font-black mb-4 uppercase tracking-wider">Espace Client</h5>
                <p className="text-xs text-sesame-400 leading-relaxed mb-3">
                  Pilotez vos services et verifiez l'historique complet de vos activités en temps réel.
                </p>
                {user ? (
                  <button 
                    onClick={() => navigateTo('dashboard')}
                    className="w-full bg-sesame-800 hover:bg-sesame-700 text-white font-bold text-xs py-2.5 rounded-xl transition">
                    Accéder à mon espace client (Espace Client)
                  </button>
                ) : (
                  <button 
                    onClick={() => { setShowAuthModal(true); setAuthMode('login'); }}
                    className="w-full bg-sesame-800 hover:bg-sesame-700 text-white font-bold text-xs py-2.5 rounded-xl transition">
                    S'inscrire / Se connecter
                  </button>
                )}
              </div>
            </div>
            <div className="max-w-7xl mx-auto border-t border-sesame-900/60 mt-10 pt-6 text-center text-xs text-sesame-500">
              © {new Date().getFullYear()} Sésame. Tous droits réservés. Propulsé par Firebase & Firestore.
            </div>
          </footer>

          {/* MODAL AUTHENTIFICATION */}
          {showAuthModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-sesame-950/80 backdrop-blur-sm animate-fade-in">
              <div className="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl border border-sesame-100 flex flex-col p-6 sm:p-8 relative">
                
                {/* Bouton de fermeture */}
                <button 
                  onClick={() => setShowAuthModal(false)}
                  className="absolute top-4 right-4 text-sesame-400 hover:text-sesame-900 transition p-2 hover:bg-sesame-50 rounded-full">
                  <span className="text-xl">×</span>
                </button>

                <div className="text-center space-y-2 mb-6">
                  <h3 className="text-2xl font-black text-sesame-950">
                    {authMode === 'login' ? 'Connexion Sésame' : 'Création de Compte Sésame'}
                  </h3>
                  <p className="text-xs text-sesame-500">
                    {authMode === 'login' ? 'Accédez instantanément à votre espace client.' : 'Enregistrez-vous pour suivre et activer vos services.'}
                  </p>
                </div>

                {/* Messages d'erreur & de succès */}
                {authError && (
                  <div className="p-3 bg-red-50 border border-red-200 text-red-700 text-xs font-semibold rounded-xl mb-4">
                    ⚠️ {authError}
                  </div>
                )}
                {authSuccess && (
                  <div className="p-3 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-semibold rounded-xl mb-4">
                    ✓ {authSuccess}
                  </div>
                )}

                {/* Formulaire principal */}
                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                  {authMode === 'register' && (
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-sesame-700 block">Nom complet</label>
                      <input 
                        type="text" 
                        required
                        placeholder="Jean Dupont"
                        value={fullName}
                        onChange={(e) => setFullName(e.target.value)}
                        className="w-full px-4 py-3 rounded-xl border border-sesame-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                      />
                    </div>
                  )}

                  <div className="space-y-1">
                    <label className="text-xs font-bold text-sesame-700 block">Adresse E-mail</label>
                    <input 
                      type="email" 
                      required
                      placeholder="votre@email.com"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-sesame-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                    />
                  </div>

                  <div className="space-y-1">
                    <label className="text-xs font-bold text-sesame-700 block">Mot de passe</label>
                    <input 
                      type="password" 
                      required
                      placeholder="••••••••"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-sesame-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                    />
                  </div>

                  <button 
                    type="submit"
                    className="w-full py-3.5 bg-sesame-800 hover:bg-sesame-900 text-white font-bold rounded-xl text-sm transition mt-2 shadow-lg">
                    {authMode === 'login' ? 'Se connecter' : "Créer mon compte"}
                  </button>
                </form>

                {/* Switch Login / Register */}
                <div className="text-center pt-6 mt-4 border-t border-sesame-100 text-xs text-sesame-500 space-x-1">
                  <span>
                    {authMode === 'login' ? "Nouveau chez Sésame ?" : "Déjà membre ?"}
                  </span>
                  <button 
                    onClick={() => {
                      setAuthMode(authMode === 'login' ? 'register' : 'login');
                      setAuthError('');
                      setAuthSuccess('');
                    }}
                    className="font-bold text-sesame-700 hover:underline">
                    {authMode === 'login' ? "Créer un compte" : "Se connecter"}
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* ========================================== */}
          {/* FENÊTRE MODALE DE L'ESPACE DE RÈGLEMENT */}
          {/* ========================================== */}
          {showPaymentModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-sesame-950/80 backdrop-blur-sm animate-fade-in">
              <div className="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl border border-sesame-100 flex flex-col p-6 sm:p-8 relative">
                
                {/* Bouton de Fermeture */}
                <button 
                  onClick={() => setShowPaymentModal(false)}
                  className="absolute top-4 right-4 text-sesame-400 hover:text-sesame-900 transition p-2 hover:bg-sesame-50 rounded-full">
                  <span className="text-xl">×</span>
                </button>

                <div className="text-center space-y-2 mb-6">
                  <span className="text-3xl">💳</span>
                  <h3 className="text-2xl font-black text-sesame-950">Espace de Règlement</h3>
                  <p className="text-xs text-sesame-500">Sélectionnez le service que vous désirez payer :</p>
                </div>

                <div className="space-y-4">
                  
                  {/* Option 1 : Digital & Web */}
                  <a 
                    href="https://payment.sesame.fr/digital-web" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    onClick={() => {
                      handlePaymentClick("SERVICES Digital & Web");
                      setShowPaymentModal(false);
                    }}
                    className="flex items-center justify-between p-4 rounded-2xl border border-indigo-100 bg-indigo-50/30 hover:bg-indigo-50 transition text-left group">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">💻</span>
                      <div>
                        <h4 className="font-bold text-sm text-indigo-950">SERVICES Digital & Web</h4>
                        <p className="text-[11px] text-indigo-600">Projets internet, developpement web & applicatif</p>
                      </div>
                    </div>
                    <span className="text-xs font-bold text-indigo-600 group-hover:translate-x-1 transition-transform">Régler →</span>
                  </a>

                  {/* Option 2 : Conseil & Aide */}
                  <a 
                    href="https://payment.sesame.fr/conseil-aide" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    onClick={() => {
                      handlePaymentClick("SERVICES Conseil & Aide");
                      setShowPaymentModal(false);
                    }}
                    className="flex items-center justify-between p-4 rounded-2xl border border-emerald-100 bg-emerald-50/30 hover:bg-emerald-50 transition text-left group">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">🤝</span>
                      <div>
                        <h4 className="font-bold text-sm text-emerald-950">SERVICES Conseil & Aide</h4>
                        <p className="text-[11px] text-emerald-600">Aide administrative et séances de conseil stratégique</p>
                      </div>
                    </div>
                    <span className="text-xs font-bold text-emerald-600 group-hover:translate-x-1 transition-transform">Régler →</span>
                  </a>

                  {/* Option 3 : Le Reste du Monde */}
                  <a 
                    href="https://payment.sesame.fr/reste-du-monde" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    onClick={() => {
                      handlePaymentClick("SERVICES Le Reste du Monde");
                      setShowPaymentModal(false);
                    }}
                    className="flex items-center justify-between p-4 rounded-2xl border border-sesame-200 bg-sesame-50/30 hover:bg-sesame-100 transition text-left group">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">🌍</span>
                      <div>
                        <h4 className="font-bold text-sm text-sesame-950">SERVICES Le Reste du Monde</h4>
                        <p className="text-[11px] text-sesame-700">Conciergerie, logistique & requêtes sur-mesure</p>
                      </div>
                    </div>
                    <span className="text-xs font-bold text-sesame-800 group-hover:translate-x-1 transition-transform">Régler →</span>
                  </a>

                  {/* Option Exclusive : Sésame Express */}
                  <a 
                    href="https://payment.sesame.fr/sesame-express" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    onClick={() => {
                      handlePaymentClick("Option Sésame Express");
                      setShowPaymentModal(false);
                    }}
                    className="flex items-center justify-between p-4 rounded-2xl border border-amber-200 bg-amber-50/40 hover:bg-amber-50 transition text-left group">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">⚡</span>
                      <div>
                        <h4 className="font-bold text-sm text-amber-950">Option Sésame Express</h4>
                        <p className="text-[11px] text-amber-800">Traitement prioritaire ultra-rapide sous 2 heures</p>
                      </div>
                    </div>
                    <span className="text-xs font-black text-amber-800 group-hover:translate-x-1 transition-transform">Payer (80,50 €) →</span>
                  </a>

                </div>
              </div>
            </div>
          )}

          {/* ========================================== */}
          {/* FENÊTRE MODALE DE DEMANDE DE DEVIS GRATUIT */}
          {/* ========================================== */}
          {showQuoteModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-sesame-950/80 backdrop-blur-sm animate-fade-in">
              <div className="bg-white w-full max-w-xl rounded-3xl overflow-hidden shadow-2xl border border-sesame-100 flex flex-col p-6 sm:p-8 relative max-h-[90vh] overflow-y-auto">
                
                {/* Bouton de Fermeture */}
                <button 
                  onClick={() => setShowQuoteModal(false)}
                  className="absolute top-4 right-4 text-sesame-400 hover:text-sesame-900 transition p-2 hover:bg-sesame-50 rounded-full">
                  <span className="text-xl">×</span>
                </button>

                <div className="text-center space-y-2 mb-6">
                  <span className="text-3xl">📝</span>
                  <h3 className="text-2xl font-black text-sesame-950">Demander un Devis Gratuit</h3>
                  <p className="text-xs text-sesame-600">Sélectionnez nos 3 piliers adaptés à votre besoin pour une mise en relation immédiate avec nos spécialistes.</p>
                </div>

                <form onSubmit={handleQuoteSubmit} className="space-y-4">
                  
                  {/* Section des 3 Piliers Sésame */}
                  <div className="space-y-2">
                    <label className="text-xs font-bold text-sesame-800 uppercase block tracking-wider">Sélectionnez les services souhaités :</label>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                      
                      {/* Pilier Digital */}
                      <label className={`flex items-center gap-2.5 p-3 rounded-xl border cursor-pointer transition select-none ${quotePillars.digital ? 'bg-indigo-50 border-indigo-400 text-indigo-950' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'}`}>
                        <input 
                          type="checkbox" 
                          checked={quotePillars.digital} 
                          onChange={(e) => setQuotePillars({...quotePillars, digital: e.target.checked})}
                          className="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer"
                        />
                        <div className="text-left">
                          <p className="text-xs font-bold">💻 Digital</p>
                          <p className="text-[9px] text-slate-500">Site, Web & SEO</p>
                        </div>
                      </label>

                      {/* Pilier Conseil */}
                      <label className={`flex items-center gap-2.5 p-3 rounded-xl border cursor-pointer transition select-none ${quotePillars.conseil ? 'bg-emerald-50 border-emerald-400 text-emerald-950' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'}`}>
                        <input 
                          type="checkbox" 
                          checked={quotePillars.conseil} 
                          onChange={(e) => setQuotePillars({...quotePillars, conseil: e.target.checked})}
                          className="rounded text-emerald-600 focus:ring-emerald-500 w-4 h-4 cursor-pointer"
                        />
                        <div className="text-left">
                          <p className="text-xs font-bold">🤝 Conseil</p>
                          <p className="text-[9px] text-slate-500">Aide & Stratégie</p>
                        </div>
                      </label>

                      {/* Pilier Reste du Monde */}
                      <label className={`flex items-center gap-2.5 p-3 rounded-xl border cursor-pointer transition select-none ${quotePillars.resteDuMonde ? 'bg-amber-50 border-amber-400 text-amber-950' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'}`}>
                        <input 
                          type="checkbox" 
                          checked={quotePillars.resteDuMonde} 
                          onChange={(e) => setQuotePillars({...quotePillars, resteDuMonde: e.target.checked})}
                          className="rounded text-amber-600 focus:ring-amber-500 w-4 h-4 cursor-pointer"
                        />
                        <div className="text-left">
                          <p className="text-xs font-bold">🌍 Conciergerie</p>
                          <p className="text-[9px] text-slate-500">Reste du Monde</p>
                        </div>
                      </label>

                    </div>
                  </div>

                  {/* Coordonnées Client */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-sesame-800 block">Nom complet</label>
                      <input 
                        type="text" 
                        required
                        placeholder="Jean Dupont"
                        value={quoteName}
                        onChange={(e) => setQuoteName(e.target.value)}
                        className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-xs font-bold text-sesame-800 block">Téléphone</label>
                      <input 
                        type="tel" 
                        required
                        placeholder="+33 6 12 34 56 78"
                        value={quotePhone}
                        onChange={(e) => setQuotePhone(e.target.value)}
                        className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                      />
                    </div>
                  </div>

                  <div className="space-y-1">
                    <label className="text-xs font-bold text-sesame-800 block">Adresse E-mail</label>
                    <input 
                      type="email" 
                      required
                      placeholder="votre@email.com"
                      value={quoteEmail}
                      onChange={(e) => setQuoteEmail(e.target.value)}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500" 
                    />
                  </div>

                  {/* Détails du projet */}
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-sesame-800 block">Dites-nous en plus sur votre besoin :</label>
                    <textarea 
                      required
                      rows="3"
                      placeholder="Décrivez brièvement votre projet ou vos attentes spécifiques..."
                      value={quoteMessage}
                      onChange={(e) => setQuoteMessage(e.target.value)}
                      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sesame-500 resize-none"
                    ></textarea>
                  </div>

                  {/* Bouton de validation */}
                  <button 
                    type="submit"
                    className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm transition mt-2 shadow-lg flex items-center justify-center gap-2">
                    🚀 Envoyer ma Demande Gratuitement
                  </button>

                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Rendu de l'application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- FENÊTRE MODALE CODEPLAY -->

                      <div style="width: 12px; height: 12px; background-color: #eab308; border-radius: 9999px;"></div>
                      <div style="width: 12px; height: 12px; background-color: #22c55e; border-radius: 9999px;"></div>

              <div style="display: flex; align-items: center; gap: 0.5rem;">

                  <a href="https://teleprime4k.github.io/CodePlay-Multi-IA/" target="_blank" title="Ouvrir dans un nouvel onglet" style="color: #94a3b8; padding: 0.5rem; border-radius: 0.375rem; display: inline-flex; justify-content: center; align-items: center; transition: background 0.2s;">

                          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                      </svg>

                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 1.25rem; height: 1.25rem;">

                  <div class="spinner" style="margin-bottom: 1rem;"></div>
                  <p style="color: #94a3b8; font-size: 0.875rem;">Lancement de CodePlay Multi-IA...</p>
              </div>

              <iframe

                  src="" 
                  data-src="https://teleprime4k.github.io/CodePlay-Multi-IA/"
                  style="width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.5s; z-index: 10;"
                  allow="clipboard-read; clipboard-write; camera; microphone; geolocation"
                  sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-downloads">
              </iframe>
          </div>
      </div>
  </div>

  <!-- SCRIPT DE CONTRÔLE DE LA POP-UP -->
  <script>
      document.addEventListener('DOMContentLoaded', () => {
          const modal = document.getElementById('codeplayModal');
          const overlay = document.getElementById('modalOverlay');
          const btnClose = document.getElementById('btnCloseCodePlay');
          const iframe = document.getElementById('codeplayIframe');
          const loader = document.getElementById('iframeLoader');

          // Fonction pour ouvrir la fenêtre
          function openModal() {
              modal.classList.remove('pointer-events-none', 'opacity-0');
              modal.classList.add('modal-active');
              document.body.style.overflow = 'hidden'; // Empêche de faire défiler le site en arrière-plan
              
              // On charge l'iframe uniquement quand l'utilisateur clique (économie de bande passante)
              if (!iframe.src) {
                  const targetUrl = iframe.getAttribute('data-src');
                  iframe.src = targetUrl;
                  
                  // Disparition de l'écran de chargement quand l'application est prête
                  iframe.onload = () => {
                      loader.style.opacity = '0';
                      loader.style.pointerEvents = 'none';
                      iframe.style.opacity = '1';
                  };
              }
          }

          // Fonction pour fermer la fenêtre
          function closeModal() {
              modal.classList.add('pointer-events-none', 'opacity-0');
              modal.classList.remove('modal-active');
              document.body.style.overflow = ''; // Réactive le défilement normal
          }

          // Écouteur global pour intercepter le clic sur le bouton généré par React
          document.addEventListener('click', (e) => {
              const btn = e.target.closest('#btnOpenCodePlay');
              if (btn) {
                  e.preventDefault();
                  openModal();
              }
          });

          if (btnClose) btnClose.addEventListener('click', closeModal);
          if (overlay) overlay.addEventListener('click', closeModal);

          // Permet de fermer la pop-up en appuyant sur la touche "Échap" (Esc) du clavier
          document.addEventListener('keydown', (e) => {
              if (e.key === 'Escape' && !modal.classList.contains('pointer-events-none')) {
                  closeModal();
              }
          });
      });
  </script>

</body>
</html>
